name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:
  release:
    types: [created]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # 1. Docker 镜像构建与推送
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 2. macOS 打包
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --no-cache-dir pyinstaller
          pip install --no-cache-dir -r requirements.txt

      - name: Build macOS app
        run: |
          pyinstaller --name=PixelArtRefiner --onedir --console --clean --noconfirm \
            --add-data="frontend:frontend" \
            --add-data="perfectPixel/src/perfect_pixel:perfect_pixel" \
            --hidden-import=uvicorn \
            --hidden-import=fastapi \
            --hidden-import=cv2 \
            --hidden-import=numpy \
            --hidden-import=python_multipart \
            --collect-all=uvicorn \
            --collect-all=fastapi \
            api/main.py

      - name: Create ZIP
        run: |
          cd dist
          zip -r PixelArtRefiner-macOS-arm64.zip PixelArtRefiner/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PixelArtRefiner-macOS
          path: dist/PixelArtRefiner-macOS-arm64.zip
          retention-days: 30

  # 3. Windows 打包
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --no-cache-dir pyinstaller
          pip install --no-cache-dir -r requirements.txt

      - name: Build Windows app
        run: |
          pyinstaller --name=PixelArtRefiner --onedir --console --clean --noconfirm --add-data="frontend;frontend" --add-data="perfectPixel\src\perfect_pixel;perfect_pixel" --hidden-import=uvicorn --hidden-import=fastapi --hidden-import=cv2 --hidden-import=numpy --hidden-import=python_multipart --collect-all=uvicorn --collect-all=fastapi api\main.py

      - name: Create ZIP
        run: |
          Compress-Archive -Path "dist\PixelArtRefiner\*" -DestinationPath "dist\PixelArtRefiner-Windows-x64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PixelArtRefiner-Windows
          path: dist/PixelArtRefiner-Windows-x64.zip
          retention-days: 30

  # 4. Create Release (only on tags)
  create-release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/PixelArtRefiner-macOS/*.zip
            artifacts/PixelArtRefiner-Windows/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}